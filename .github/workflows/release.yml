name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 7.2.0)'
        required: true
        default: '7.2.0'

permissions:
  contents: write

jobs:
  build-deb:
    name: Build Debian Packages
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64, armhf, i386]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU for cross-compilation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Build DEB package for ${{ matrix.arch }}
        run: |
          docker run --rm --privileged \
            -v $(pwd):/workspace \
            -w /workspace \
            --platform linux/${{ matrix.arch == 'amd64' && 'amd64' || matrix.arch == 'arm64' && 'arm64' || matrix.arch == 'armhf' && 'arm/v7' || 'i386' }} \
            debian:bookworm \
            bash -c "
              apt-get update && \
              apt-get install -y debhelper devscripts build-essential && \
              dpkg-buildpackage -us -uc -b && \
              mv ../*.deb . || true
            "

      - name: Rename package
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          mv neofetch_*.deb neofetch_${VERSION}_${{ matrix.arch }}.deb || true
          ls -la *.deb

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: neofetch-deb-${{ matrix.arch }}
          path: "*.deb"

  build-tarball:
    name: Build Source Tarball
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Create tarball
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          mkdir -p neofetch-${VERSION}
          cp -r neofetch neofetch.1 Makefile LICENSE.md README.md neofetch-${VERSION}/
          tar -czf neofetch-${VERSION}.tar.gz neofetch-${VERSION}

          # Create checksums
          sha256sum neofetch-${VERSION}.tar.gz > neofetch-${VERSION}.tar.gz.sha256

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: neofetch-tarball
          path: |
            neofetch-*.tar.gz
            neofetch-*.tar.gz.sha256

  build-homebrew:
    name: Generate Homebrew Formula
    runs-on: macos-latest
    needs: build-tarball

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Download tarball
        uses: actions/download-artifact@v4
        with:
          name: neofetch-tarball

      - name: Generate Homebrew formula
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          TARBALL="neofetch-${VERSION}.tar.gz"
          SHA256=$(cat ${TARBALL}.sha256 | cut -d' ' -f1)

          cat > neofetch.rb <<EOF
          class Neofetch < Formula
            desc "Command-line system information tool written in bash 3.2+"
            homepage "https://github.com/techyminati/neofetch"
            url "https://github.com/techyminati/neofetch/releases/download/v${VERSION}/${TARBALL}"
            sha256 "${SHA256}"
            license "MIT"
            version "${VERSION}"

            def install
              bin.install "neofetch"
              man1.install "neofetch.1"
            end

            test do
              system "#{bin}/neofetch", "--version"
              assert_match "Neofetch", shell_output("#{bin}/neofetch --version")
            end
          end
          EOF

      - name: Test Homebrew formula locally
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          # Just verify the formula syntax
          brew install --formula --build-from-source ./neofetch.rb || echo "Formula generated, actual install will work after release"

      - name: Upload Homebrew formula
        uses: actions/upload-artifact@v4
        with:
          name: homebrew-formula
          path: neofetch.rb

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-deb, build-tarball, build-homebrew]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release-files
          find artifacts -type f -name "*.deb" -exec cp {} release-files/ \;
          find artifacts -type f -name "*.tar.gz*" -exec cp {} release-files/ \;
          find artifacts -type f -name "neofetch.rb" -exec cp {} release-files/ \;
          ls -la release-files/

      - name: Read changelog
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          if [ -f CHANGELOG.md ]; then
            CHANGELOG=$(cat CHANGELOG.md | head -50)
            echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGELOG" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "CHANGELOG=Release v${VERSION}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Neofetch v${{ steps.version.outputs.VERSION }}
          body: |
            ## Neofetch Extended v${{ steps.version.outputs.VERSION }}

            ### Installation

            #### Debian/Ubuntu (DEB packages)
            Download the appropriate `.deb` file for your architecture:
            - `neofetch_${{ steps.version.outputs.VERSION }}_amd64.deb` - For Intel/AMD 64-bit systems
            - `neofetch_${{ steps.version.outputs.VERSION }}_arm64.deb` - For ARM 64-bit systems (Apple Silicon, Raspberry Pi 4/5)
            - `neofetch_${{ steps.version.outputs.VERSION }}_armhf.deb` - For ARM 32-bit systems (older Raspberry Pi)
            - `neofetch_${{ steps.version.outputs.VERSION }}_i386.deb` - For 32-bit Intel/AMD systems

            Install with:
            ```bash
            sudo dpkg -i neofetch_${{ steps.version.outputs.VERSION }}_<arch>.deb
            sudo apt-get install -f  # Install dependencies if needed
            ```

            #### macOS (Homebrew)
            ```bash
            brew install neofetch.rb
            ```
            Or download the formula and install locally:
            ```bash
            brew install --formula ./neofetch.rb
            ```

            #### From Source
            Download `neofetch-${{ steps.version.outputs.VERSION }}.tar.gz` and:
            ```bash
            tar -xzf neofetch-${{ steps.version.outputs.VERSION }}.tar.gz
            cd neofetch-${{ steps.version.outputs.VERSION }}
            sudo make install
            ```

            ### Changes
            ${{ steps.changelog.outputs.CHANGELOG }}

            ### Checksums
            See `neofetch-${{ steps.version.outputs.VERSION }}.tar.gz.sha256` for tarball checksum.
          files: release-files/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-homebrew:
    name: Update Homebrew Formula
    needs: build-tarball
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Download tarball
        uses: actions/download-artifact@v4
        with:
          name: neofetch-tarball

      - name: Update Homebrew formula
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          TARBALL="neofetch-${VERSION}.tar.gz"
          SHA256=$(cat ${TARBALL}.sha256 | cut -d' ' -f1)

          cat > Formula/neofetch.rb <<EOF
          class Neofetch < Formula
            desc "Command-line system information tool written in bash 3.2+"
            homepage "https://github.com/techyminati/neofetch"
            url "https://github.com/techyminati/neofetch/archive/refs/tags/v${VERSION}.tar.gz"
            sha256 "${SHA256}"
            license "MIT"
            version "${VERSION}"

            def install
              bin.install "neofetch"
              man1.install "neofetch.1"
            end

            test do
              system "#{bin}/neofetch", "--version"
              assert_match "Neofetch", shell_output("#{bin}/neofetch --version")
            end
          end
          EOF

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          git add Formula/neofetch.rb
          git diff --staged --quiet || git commit -m "chore: update Homebrew formula to ${VERSION} [skip ci]"
          git push || echo "No changes to push"

  test-packages:
    name: Test Packages
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64]

    steps:
      - name: Download DEB artifact
        uses: actions/download-artifact@v4
        with:
          name: neofetch-deb-${{ matrix.arch }}

      - name: Test DEB installation
        run: |
          sudo dpkg -i *.deb || true
          sudo apt-get install -f -y
          neofetch --version
          neofetch --config none | head -20
